services:
  - type: web
    name: test-webhook-endpoint
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: FORWARD_WEBHOOK_URL
        sync: false
      - key: FORWARD_WEBHOOK_TIMEOUT_MS
        value: 15000
